server {
    listen 80;
    server_name localhost;

    # Serve the project from the /feedback_form/ subpath
    location /feedback_form/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /feedback_form/index.html;
    }

    # Proxy API requests to the backend server (if separate) or same
    # For a unified Node app, just proxy everything to 3000
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
